services:
  db:
    image: postgres:16-alpine
    container_name: notes_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: note
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d note"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: